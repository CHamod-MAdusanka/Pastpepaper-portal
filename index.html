<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education-Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1">📚 Past Papers Portal</span>
        </div>
    </nav>

    <div class="container mt-5">
        
        <div class="row mb-4">
            <div class="col-md-8 mx-auto">
                <input type="text" id="searchBar" class="form-control form-control-lg shadow-sm" placeholder="Search for papers...">
            </div>
        </div>

        <div class="row mb-4">
            <div class="col text-center">
                <button class="btn btn-outline-primary m-1" onclick="filterPapers('All')">All</button>
                <button class="btn btn-outline-primary m-1" onclick="filterPapers('IT')">IT</button>
                <button class="btn btn-outline-primary m-1" onclick="filterPapers('Mathematics')">Mathematics</button>
                <button class="btn btn-outline-primary m-1" onclick="filterPapers('Science')">Science</button>
                <button class="btn btn-outline-primary m-1" onclick="filterPapers('English')">English</button>
                <button class="btn btn-outline-primary m-1" onclick="filterPapers('Budisam')">Budisam</button>
                <button class="btn btn-outline-primary m-1" onclick="filterPapers('Islam')">Islam</button>
                <button class="btn btn-outline-primary m-1" onclick="filterPapers('History')">History</button>
                <button class="btn btn-outline-primary m-1" onclick="filterPapers('Economics')">Economics</button>
                <button class="btn btn-outline-primary m-1" onclick="filterPapers('Geography')">Geography</button>
                <button class="btn btn-outline-primary m-1" onclick="filterPapers('Music')">Music</button>
                <button class="btn btn-outline-primary m-1" onclick="filterPapers('Drama')">Drama</button>
                <button class="btn btn-outline-primary m-1" onclick="filterPapers('Dancing')">Dancing</button>
                <button class="btn btn-outline-primary m-1" onclick="filterPapers('Art')">Art</button>
            </div>
            </div>
        </div>

        <div class="row" id="papers-container">
            </div>
    </div>

    <script src="app.js"></script>
    
</body>
</html>
