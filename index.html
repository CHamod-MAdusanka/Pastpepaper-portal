<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education-Portal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1">📚 Past Papers Portal</span>
        </div>
    </nav>
    <div class="container mt-5">
        
        <div class="row mb-4">
            <div class="col-md-8 mx-auto">
                <input type="text" id="searchBar" class="form-control form-control-lg shadow-sm" placeholder="Search for papers...">
            </div>
        </div>
        <div class="row mb-4">
            <div class="col text-center">
                <button class="btn btn-outline-primary m-1">All</button>
                <button class="btn btn-outline-primary m-1">IT</button>
                <button class="btn btn-outline-primary m-1">Mathematics</button>
                <button class="btn btn-outline-primary m-1">Science</button>
                <button class="btn btn-outline-primary m-1">English</button>
                <button class="btn btn-outline-primary m-1">Budisam</button>
                <button class="btn btn-outline-primary m-1">Religion</button>
                <button class="btn btn-outline-primary m-1">History</button>
                <button class="btn btn-outline-primary m-1">Economics</button>
                <button class="btn btn-outline-primary m-1">Geography</button>
                <button class="btn btn-outline-primary m-1">Music</button>
                <button class="btn btn-outline-primary m-1">Drama</button>
                <button class="btn btn-outline-primary m-1">Dancing</button>
            </div>
            </div>

        <div class="row" id="papers-container">
            
            <div class="col-md-4 mb-3">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">2023 IT Past Paper</h5>
                        <span class="badge bg-secondary mb-3">IT</span>
                        <br>
                        <a href="#" class="btn btn-success btn-sm w-100">Download PDF</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>


    
</body>
</html>
